<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSJ Solutions</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        /* Top Half - Ukrainian Blue */
        .top-half {
            background-color: #0057B7; 
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
        }
        /* Bottom Half - Ukrainian Yellow */
        .bottom-half {
            background-color: #FFDD00; 
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
        }
        h1 {
            color: #FFFFFF; /* Bright white text over the blue */
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
        }
        h2 {
            color: #1A1A1A; /* Dark contrast text over the yellow */
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        /* Mobile Scaling */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="top-half">
        <h1>MSJ SOLUTIONS</h1>
    </div>
    
    <div class="top-half" style="display:none;"></div> <!-- Structural spacer -->

    <div class="bottom-half">
        <h2>СЛАВА УКРАЇНІ!</h2>
    </div>

</body>
</html>
