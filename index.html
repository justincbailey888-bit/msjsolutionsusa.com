<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSJ Solutions</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        /* Top Half - Ukrainian Blue */
        .top-half {
            background-color: #0057B7; 
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 25px;
        }
        /* Bottom Half - Ukrainian Yellow */
        .bottom-half {
            background-color: #FFDD00; 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 25px;
        }
        /* Crisp White Text Layout */
        h1 {
            color: #FFFFFF; /* Bright white text over the blue */
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
        }
        h2 {
            color: #1A1A1A; /* Dark contrast text over the yellow */
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        /* Sleek Audio Controller Style */
        .audio-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .audio-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        audio {
            height: 32px;
            outline: none;
        }
        /* Mobile Scaling */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; letter-spacing: 2px; }
            h2 { font-size: 1.6rem; }
            .audio-container { padding: 8px 16px; }
        }
    </style>
</head>
<body>

    <div class="top-half">
        <h1>MSJ SOLUTIONS</h1>
    </div>
    
    <div class="bottom-half">
        <h2>СЛАВА УКРАЇНІ!</h2>
        
        <!-- Native Audio Streaming Box -->
        <div class="audio-container">
            <span class="audio-title">🎵 SadSvit — Касета</span>
            <audio controls>
                <source src="https://archive.org" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

</body>
</html>
