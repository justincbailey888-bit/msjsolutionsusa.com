<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSJ Solutions</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        /* Top Half - Ukrainian Blue */
        .top-half {
            background-color: #0057B7; 
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 25px;
        }
        /* Bottom Half - Ukrainian Yellow */
        .bottom-half {
            background-color: #FFDD00; 
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 25px;
        }
        /* American Flag Text Effect */
        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 4px;
            /* Creates crisp red, white, and blue horizontal stripes inside the text */
            background: linear-gradient(
                to bottom, 
                #B22234 0%, #B22234 33.33%, 
                #FFFFFF 33.33%, #FFFFFF 66.66%, 
                #3C3B6E 66.66%, #3C3B6E 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Drop shadow keeps the text highly visible against the blue background */
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.3));
        }
        h2 {
            color: #1A1A1A; /* Dark contrast text over the yellow */
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        /* Mobile Scaling */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; letter-spacing: 2px; }
            h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="top-half">
        <h1>MSJ SOLUTIONS</h1>
    </div>
    
    <div class="bottom-half">
        <h2>СЛАВА УКРАЇНІ!</h2>
    </div>

</body>
</html>
